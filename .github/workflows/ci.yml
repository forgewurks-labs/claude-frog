name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest reasonably-supported through current: the frog is stdlib-only,
        # so this is really a "does it still parse and render everywhere" gate.
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile (syntax gate)
        run: python -m compileall -q claude_frog.py tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
